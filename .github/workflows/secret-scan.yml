name: Secret Scan

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"

jobs:
  local-secret-hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Clone repository
        run: |
          set -euxo pipefail
          git clone --depth 1 "https://github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          git fetch --depth 2 origin "${GITHUB_SHA}"
          git checkout "${GITHUB_SHA}"
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            git fetch --depth 1 origin "${GITHUB_BASE_REF}"
          elif [ -n "${GITHUB_EVENT_BEFORE:-}" ] && [ "${GITHUB_EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            git fetch --depth 1 origin "${GITHUB_EVENT_BEFORE}"
          fi

      - name: Privacy policy scan
        run: |
          cd repo
          python3 scripts/check_private_data_policy.py

      - name: Secret hygiene scan
        run: |
          cd repo
          if [ -n "${GITHUB_BASE_REF:-}" ]; then
            python3 scripts/check_secret_hygiene.py --base-ref FETCH_HEAD
          elif [ -n "${GITHUB_EVENT_BEFORE:-}" ] && [ "${GITHUB_EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]; then
            python3 scripts/check_secret_hygiene.py --base-ref FETCH_HEAD
          else
            python3 scripts/check_secret_hygiene.py
          fi

      - name: Public release scan
        run: |
          cd repo
          python3 scripts/check_public_release.py
